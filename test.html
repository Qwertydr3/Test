<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Reindirizzamento manuale</title>
    <style>
        button {
            padding: 12px 20px;
            font-size: 18px;
            border: none;
            background: #0078ff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #005fcc;
        }
    </style>
</head>
<body>
    <h2>Premi il bottone per andare alla pagina principale</h2>

    <button onclick="window.location.href='index.html'">
        Vai a index.html
    </button>
</body>
</html>
