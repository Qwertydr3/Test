<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Qwertydre Terminal</title>
    <style>
        body { background: #000; color: #e2e8f0; font-family: monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        #matrix-canvas { position: fixed; inset: 0; z-index: -1; }
        .main-col { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; position: relative; z-index: 1; background: rgba(5,7,10,0.95); padding: 30px; border-radius: 12px; border: 1px solid #1e293b; }
        
        .list-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
        .ticker-btn { background: #1e293b; color: white; border: 1px solid #334155; padding: 15px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .ticker-at-risk { border: 2px solid #ff0000 !important; background: #3c0000 !important; }
        
        #tv-widget { height: 400px; background: #0d1117; border: 1px solid #334155; }
        .bottom-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .news-box { height: 350px; background: #000; border: 1px solid #2563eb; padding: 15px; overflow: hidden; display: flex; flex-direction: column; }
        
        .ai-link { text-decoration: none; display: block; text-align: center; padding: 20px; background: #2563eb; color: white; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div class="main-col">
    <div style="display: flex; gap: 10px;">
        <button class="ticker-btn" style="flex:1" onclick="setRegion('USA')">USA</button>
        <button class="ticker-btn" style="flex:1" onclick="setRegion('EU')">EU</button>
        <button class="ticker-btn" style="flex:1" onclick="setRegion('ASIA')">ASIA</button>
    </div>
    <div class="list-container" id="ticker-list"></div>
    
    <div id="tv-widget"></div>
    
    <div class="bottom-panels">
        <div class="news-box">
            <div style="color:yellow; margin-bottom:10px; flex-shrink: 0;">CALENDARIO ECONOMICO MACRO</div>
            <div style="flex-grow: 1; overflow: hidden;">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                {
                    "colorTheme": "dark",
                    "isTransparent": true,
                    "width": "100%",
                    "height": "100%",
                    "locale": "it",
                    "importanceFilter": "-1,0,1",
                    "currencyFilter": "USD,EUR,JPY,GBP"
                }
                </script>
            </div>
        </div>
        <div class="news-box" id="geo-box">
            <div style="color:red; margin-bottom:10px; flex-shrink: 0;">GEOPOLITICA / ALERT IMPATTO</div>
            <div id="geo-feed" style="font-size: 13px; flex-grow: 1; overflow-y: auto;">
                Monitoraggio attivo...
            </div>
        </div>
    </div>

    <select id="ai-engine" onchange="updateLinks()" style="padding:15px; font-size:16px;">
        <option value="chatgpt">ChatGPT</option>
        <option value="perplexity">Perplexity</option>
        <option value="claude">Claude</option>
    </select>
    <a id="ai-anchor" href="#" target="_blank" class="ai-link">ESEGUI ANALISI</a>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    const db = {
        USA: [{n:"VZ",s:"VZ",cat:"Tech"},{n:"T",s:"T",cat:"Tech"},{n:"MO",s:"MO",cat:"Energy"},{n:"KO",s:"KO",cat:"Energy"},{n:"XOM",s:"XOM",cat:"Energy"},{n:"CVX",s:"CVX",cat:"Energy"},{n:"JPM",s:"JPM",cat:"Finance"},{n:"PG",s:"PG",cat:"Finance"},{n:"ABBV",s:"ABBV",cat:"Tech"},{n:"PFE",s:"PFE",cat:"Tech"}],
        EU: [{n:"ENI",s:"ENI.MI",cat:"Energy"},{n:"ISP",s:"ISP.MI",cat:"Finance"},{n:"TTE",s:"TTE",cat:"Energy"},{n:"SHEL",s:"SHEL.L",cat:"Energy"},{n:"BAS",s:"BAS.DE",cat:"Tech"},{n:"BAYN",s:"BAYN.DE",cat:"Tech"},{n:"NESN",s:"NESN.SW",cat:"Finance"}],
        ASIA: [{n:"7203",s:"7203.T",cat:"Tech"},{n:"6758",s:"6758.T",cat:"Tech"},{n:"0005",s:"0005.HK",cat:"Finance"},{n:"0700",s:"0700.HK",cat:"Tech"},{n:"9988",s:"9988.HK",cat:"Tech"}]
    };

    // Matrix Effetto
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/20)).fill(0);
    function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#0F0'; ctx.font = '15px monospace';
        drops.forEach((y, i) => {
            ctx.fillText(Math.random() > 0.5 ? "1" : "0", i*20, y*20);
            if(y*20 > canvas.height && Math.random() > 0.98) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);

    let currentRiskCategory = null;

    function setRegion(reg) {
        const container = document.getElementById('ticker-list');
        container.innerHTML = "";
        db[reg].forEach(stock => {
            const btn = document.createElement('button');
            btn.className = "ticker-btn";
            btn.dataset.cat = stock.cat;
            btn.innerText = stock.n;
            btn.onclick = () => load(stock.s);
            if (currentRiskCategory === stock.cat) btn.classList.add('ticker-at-risk');
            container.appendChild(btn);
        });
    }

    function analizzaRischio(evento, categoriaTarget) {
        currentRiskCategory = categoriaTarget;
        document.getElementById('geo-feed').innerHTML = `> ALERT: ${evento}<br>> Impatto su: <b>${categoriaTarget}</b>`;
        document.querySelectorAll('.ticker-btn').forEach(btn => {
            if(btn.dataset.cat === categoriaTarget) btn.classList.add('ticker-at-risk');
        });
        updateLinks();
    }

    function load(s) {
        window.currentSymbol = s;
        document.getElementById('tv-widget').innerHTML = "";
        new TradingView.widget({"container_id": "tv-widget", "symbol": s, "width": "100%", "height": "400", "theme": "dark", "locale": "it", "widgetType": "symbol-info"});
        updateLinks();
    }

    function updateLinks() {
        const s = window.currentSymbol || "VZ";
        const engine = document.getElementById('ai-engine').value;
        const geoInfo = document.getElementById('geo-feed').innerText.replace(/\n/g, " ");
        const p = `Analisi quantitativa su ${s}. Rischio Geopolitico: "${geoInfo}". Analizza Macro 2026, Fondamentali, Dividendi, impatto del rischio e idoneità long-term.`;
        const urls = { chatgpt: `https://chat.openai.com/?q=${encodeURIComponent(p)}`, perplexity: `https://www.perplexity.ai/?q=${encodeURIComponent(p)}`, claude: `https://claude.ai/new?q=${encodeURIComponent(p)}` };
        document.getElementById('ai-anchor').href = urls[engine];
    }

    setTimeout(() => analizzaRischio("Tensioni logistiche nel blocco Asiatico - Rischio Supply Chain", "Tech"), 2000);

    setRegion('USA');
    load('VZ');
</script>
</body>
</html>
