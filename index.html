<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Qwertydre Terminal</title>
    <style>
        body { background: #000; color: #e2e8f0; font-family: monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        #matrix-canvas { position: fixed; inset: 0; z-index: -1; }
        .main-col { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; position: relative; z-index: 1; background: rgba(5,7,10,0.95); padding: 30px; border-radius: 12px; border: 1px solid #1e293b; }
        .list-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
        .ticker-btn { background: #1e293b; color: white; border: 1px solid #334155; padding: 15px; cursor: pointer; font-size: 14px; font-weight: bold; }
        #tv-widget { height: 400px; background: #0d1117; border: 1px solid #334155; }
        .bottom-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .news-box { height: 350px; background: #000; border: 1px solid #2563eb; padding: 15px; overflow: hidden; display: flex; flex-direction: column; }
        .ai-link { text-decoration: none; display: block; text-align: center; padding: 20px; background: #2563eb; color: white; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div class="main-col">
    <div style="display: flex; gap: 10px;">
        <button class="ticker-btn" style="flex:1" onclick="setRegion('USA')">USA</button>
        <button class="ticker-btn" style="flex:1" onclick="setRegion('EU')">EU</button>
        <button class="ticker-btn" style="flex:1" onclick="setRegion('ASIA')">ASIA</button>
    </div>
    <div class="list-container" id="ticker-list"></div>
    
    <div id="tv-widget"></div>

    <div class="bottom-panels" style="grid-template-columns: 1fr;">
        <div class="news-box" style="height: auto; border: 1px solid #334155; background: #050505; color: #fff;">
            <div style="color:#0f0; font-weight:bold; margin-bottom:10px;"> Range Atteso (30GG)</div>
            <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 10px;">
                <input type="number" id="m-price" placeholder="Prezzo Attuale" style="background:#000; color:#0f0; border:1px solid #333; padding:5px; width:120px;">
                <input type="number" id="m-vol" placeholder="Volatilità %" style="background:#000; color:#0f0; border:1px solid #333; padding:5px; width:120px;">
                <button onclick="calcolaStatistica()" style="background:#2563eb; color:white; border:none; padding:8px 15px; cursor:pointer; font-weight:bold;">SIMULA RANGE</button>
            </div>
            <div id="m-output" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; font-size: 13px;">
                <div>PESSIMISTICO (5%): <span id="res-low" style="color:red">--</span></div>
                <div>ATTESO (50%): <span id="res-med" style="color:yellow">--</span></div>
                <div>OTTIMISTICO (95%): <span id="res-high" style="color:lime">--</span></div>
            </div>
        </div>
    </div>
    
    <div class="bottom-panels">
        <div class="news-box">
            <div style="color:yellow; margin-bottom:10px; flex-shrink: 0;">CALENDARIO ECONOMICO MACRO</div>
            <div style="flex-grow: 1; overflow: hidden;"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>{"colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "locale": "it", "importanceFilter": "-1,0,1", "currencyFilter": "USD,EUR,JPY,GBP"}</script></div>
        </div>
        <div class="news-box" id="geo-box">
            <div style="color:red; margin-bottom:10px; flex-shrink: 0;">GEOPOLITICA / BREAKING NEWS</div>
            <div style="flex-grow: 1; overflow: hidden;"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>{"feedMode": "market", "colorTheme": "dark", "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "locale": "it"}</script></div>
        </div>
    </div>

    <select id="ai-engine" onchange="updateLinks()" style="padding:15px; font-size:16px;">
        <option value="chatgpt">ChatGPT</option><option value="perplexity">Perplexity</option><option value="claude">Claude</option>
    </select>
    <a id="ai-anchor" href="#" target="_blank" class="ai-link">ESEGUI ANALISI</a>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    const db = {
        USA: [{n:"VZ",s:"VZ",cat:"Tech",vol:22},{n:"T",s:"T",cat:"Tech",vol:20},{n:"XOM",s:"XOM",cat:"Energy",vol:28},{n:"JPM",s:"JPM",cat:"Finance",vol:24}],
        EU: [{n:"ENI",s:"ENI.MI",cat:"Energy",vol:27},{n:"TTE",s:"TTE",cat:"Energy",vol:26},{n:"ISP",s:"ISP.MI",cat:"Finance",vol:25}],
        ASIA: [{n:"7203",s:"7203.T",cat:"Tech",vol:30},{n:"0700",s:"0700.HK",cat:"Tech",vol:32}]
    };

    function setRegion(reg) {
        const container = document.getElementById('ticker-list');
        container.innerHTML = "";
        db[reg].forEach(stock => {
            const btn = document.createElement('button');
            btn.className = "ticker-btn";
            btn.innerText = stock.n;
            btn.onclick = () => load(stock.s, stock.vol);
            container.appendChild(btn);
        });
    }

    function load(s, vol) {
        window.currentSymbol = s;
        document.getElementById('m-vol').value = vol;
        document.getElementById('tv-widget').innerHTML = "";
        new TradingView.widget({"container_id": "tv-widget", "symbol": s, "width": "100%", "height": "400", "theme": "dark", "locale": "it", "widgetType": "symbol-info"});
        updateLinks();
    }

    function calcolaStatistica() {
        const S0 = parseFloat(document.getElementById('m-price').value);
        const vol = parseFloat(document.getElementById('m-vol').value) / 100;
        if (!S0 || !vol) return alert("Inserisci Prezzo e Volatilità");
        const T = 30 / 365, mu = 0.05, N = 1000;
        let results = [];
        for(let i=0; i<N; i++) {
            const Z = (Math.sqrt(-2.0 * Math.log(Math.random())) * Math.cos(2.0 * Math.PI * Math.random()));
            const ST = S0 * Math.exp((mu - 0.5 * Math.pow(vol, 2)) * T + vol * Math.sqrt(T) * Z);
            results.push(ST);
        }
        results.sort((a,b) => a-b);
        document.getElementById('res-low').innerText = results[Math.floor(N * 0.05)].toFixed(2);
        document.getElementById('res-med').innerText = results[Math.floor(N * 0.50)].toFixed(2);
        document.getElementById('res-high').innerText = results[Math.floor(N * 0.95)].toFixed(2);
    }

    function updateLinks() {
        const s = window.currentSymbol || "VZ";
        const engine = document.getElementById('ai-engine').value;
        const p = `Analisi quantitativa su ${s}. Considera i dati geopolitici e macroeconomici attuali. Analizza Fondamentali, dividendi e idoneità long-term 2026.`;
        const urls = { chatgpt: `https://chat.openai.com/?q=${encodeURIComponent(p)}`, perplexity: `https://www.perplexity.ai/?q=${encodeURIComponent(p)}`, claude: `https://claude.ai/new?q=${encodeURIComponent(p)}` };
        document.getElementById('ai-anchor').href = urls[engine];
    }

    setRegion('USA');
    load('VZ', 22);
</script>
</body>
</html>
