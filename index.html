<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Matrix Boot Sequence</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        background: black;
        overflow: hidden;
        height: 100%;
        font-family: monospace;
    }

    /* Testo centrale stile boot */
    #bootText {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #00ff00;
        font-size: 22px;
        text-align: center;
        opacity: 0;
        animation: fadeIn 2s forwards;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }
</style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div id="bootText">
    <span>Avvio Sistemi...</span><br>
    <span>Caricamento Moduli...</span><br>
    <span>Decriptazione core...</span><br>
    <span>Sequenza Boot completata.</span><br><br>
    <span>Reindirizzamento...</span>
</div>

<script>
    /* ---------------- MATRIX EFFECT ---------------- */
    const canvas = document.getElementById("matrixCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const fontSize = 18;
    const columns = canvas.width / fontSize;

    const drops = [];
    for (let i = 0; i < columns; i++) {
        drops[i] = Math.random() * canvas.height;
    }

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#00ff00";
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    setInterval(drawMatrix, 40);

    /* ---------------- REDIRECT ---------------- */
    const redirectTime = 4; // secondi prima del redirect

    setTimeout(() => {
        window.location.href = "menu.html";
    }, redirectTime * 1000);
</script>

</body>
</html>
