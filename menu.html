<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Qwertydre Terminal</title>
</head>
<style>
    body { background: #000; color: #e2e8f0; font-family: monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        #matrix-canvas { position: fixed; inset: 0; z-index: -1; }
        .main-col { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; position: relative; z-index: 1; background: rgba(5, 7, 10, 0.6); backdrop-filter: blur(5px); padding: 30px; border-radius: 12px; border: 1px solid rgba(30, 41, 59, 0.5); }
        .ticker-btn { background: #1e293b; color: white; border: 1px solid #334155; padding: 15px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .admin-panel { background: #0f172a; padding: 15px; border-radius: 8px; display: flex; gap: 10px; align-items: center; }
        #tv-widget { height: 400px; background: #0d1117; border: 1px solid #334155; }
        .bottom-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .news-box { height: 350px; background: rgba(0,0,0,0.6); border: 1px solid #2563eb; padding: 15px; overflow: hidden; display: flex; flex-direction: column; }
        .ai-link { text-decoration: none; display: block; text-align: center; padding: 20px; background: #2563eb; color: white; font-size: 18px; font-weight: bold; }
 /* NAVBAR */
    .navbar {
        width: 100%;
        background: rgba(0, 0, 0, 0.35);
        margin-bottom: 60px; 
        justify-content: center;       
        padding: 12px 20px;
        display: flex;
        gap: 15px;
        position: sticky;
        top: 0;
        z-index: 10;
    }
    .nav-btn {
            padding: 15px 40px;
            font-size: 20px;
            color: #00ff00;
            background: transparent;
            border: 2px solid #00ff00;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
            box-shadow: 0 0 10px #00ff00;
    }

    .nav-btn:hover {
            background: #00ff00;
            color: black;
            box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
            transform: scale(1.05);
    }

            .matrix-btn {
            padding: 15px 40px;
            font-size: 20px;
            color: #00ff00;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            border: 2px solid #00ff00;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
            box-shadow: 0 0 10px #00ff00;
        }

        .matrix-btn:hover {
            background: #00ff00;
            color: black;
            box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
            transform: scale(1.05);
        }


    /* SECTIONS */
    .section {
        display: none;
        padding: 30px;
        margin: 20px auto;
        max-width: 1200px;

        background: rgba(5, 7, 10, 0.45);
        border-radius: 12px;
        border: 1px solid rgba(30, 41, 59, 0.5);
        backdrop-filter: blur(5px);

        z-index: 1;
        position: relative;
    }

    .section.active {
        display: block;
    }

    iframe {
        width: 100%;
        height: 80vh;
        border: none;
        border-radius: 8px;
    }

 </style>
<body>
    <canvas id="matrix-canvas"></canvas>
    
   <!-- NAVBAR -->
<div class="navbar">
    <button class="nav-btn" onclick="window.location.href='menu.html'">Home</button>
    <button class="nav-btn" onclick="window.location.href='warmonitor.html'">War Monitor</button>
    <button class="nav-btn" onclick="window.location.href='analisi.html'">Analisi Finanziarie</button>
    <button class="nav-btn" onclick="window.location.href='download.html'">Download</button>
    
</div>



    
<script>
    const canvas = document.getElementById("matrix-canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const fontSize = 18;
    const columns = canvas.width / fontSize;

    const drops = [];
    for (let i = 0; i < columns; i++) {
        drops[i] = Math.random() * canvas.height;
    }

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#00ff00";
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    setInterval(drawMatrix, 40);
</script>
</body>
</html>
